<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Claude Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1915;
  --bg2: #211f1a;
  --bg3: #2a2820;
  --sidebar: #17160f;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --accent: #d4a853;
  --accent-dim: rgba(212,168,83,0.15);
  --accent-glow: rgba(212,168,83,0.06);
  --text: #e8e4d8;
  --text2: #9a9283;
  --text3: #5c5649;
  --user-bg: #242118;
  --ai-bg: transparent;
  --r: 18px;
  --font-body: 'Geist Mono', monospace;
  --font-serif: 'Instrument Serif', serif;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; }

/* ── LAYOUT ── */
#shell {
  display: flex;
  height: 100vh;
  position: relative;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 260px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  z-index: 100;
}

#sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.brand {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.brand-dot { color: var(--accent); }

#new-chat-btn {
  width: 100%;
  background: var(--accent-dim);
  border: 1px solid rgba(212,168,83,0.25);
  color: var(--accent);
  font-family: var(--font-body);
  font-size: 12px;
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
#new-chat-btn:hover { background: rgba(212,168,83,0.22); border-color: rgba(212,168,83,0.4); }

#conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
#conv-list::-webkit-scrollbar { width: 3px; }
#conv-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.conv-item {
  padding: 9px 10px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.12s;
  min-width: 0;
  position: relative;
}
.conv-item:hover { background: var(--bg3); }
.conv-item.active { background: var(--accent-dim); }
.conv-item-title {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.conv-item.active .conv-item-title { color: var(--accent); }
.conv-item-icon { font-size: 13px; flex-shrink: 0; opacity: 0.5; }
.conv-delete {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all 0.12s;
  flex-shrink: 0;
}
.conv-item:hover .conv-delete { opacity: 1; }
.conv-delete:hover { color: #e07070; background: rgba(224,112,112,0.1); }

.conv-section-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 10px 10px 4px;
}

#sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
}
.sync-status {
  font-size: 10px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 2px;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
}
.sync-dot.ok { background: #7dba84; }
.sync-dot.syncing { background: var(--accent); animation: pulse-dot 1s infinite; }
.sync-dot.err { background: #e07070; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MAIN ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

#sidebar-toggle {
  display: none;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  width: 34px; height: 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.topbar-title {
  flex: 1;
  font-size: 13px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

.model-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px 5px 8px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.model-pill:hover { border-color: var(--accent); background: var(--accent-dim); }
.model-pill-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.model-pill select {
  background: none;
  border: none;
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 11px;
  outline: none;
  cursor: pointer;
}
.model-pill select option { background: var(--bg2); }

.sys-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text3);
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.sys-btn:hover { border-color: var(--border2); color: var(--text2); }

/* ── SYSTEM PROMPT ── */
#sys-drawer {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease;
}
#sys-drawer.open { max-height: 140px; }
.sys-inner { padding: 12px 20px; }
.sys-inner label { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; }
#sys-prompt {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 12px;
  padding: 9px 12px;
  resize: none;
  min-height: 56px;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.6;
}
#sys-prompt:focus { border-color: rgba(212,168,83,0.35); }

/* ── MESSAGES ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0 12px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.msg-outer {
  max-width: 780px;
  margin: 0 auto;
  padding: 4px 24px;
}

/* Subtle hover reveal */
.msg-row { position: relative; }
.msg-row:hover .msg-actions { opacity: 1; pointer-events: auto; }

/* User message */
.msg-row.user {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.user-bubble {
  background: var(--user-bg);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px 18px 4px 18px;
  padding: 13px 18px;
  max-width: 82%;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
  font-size: 14px;
  position: relative;
}

/* AI message */
.msg-row.assistant {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.ai-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 1px solid rgba(212,168,83,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  font-size: 13px;
}

.ai-content {
  flex: 1;
  min-width: 0;
}

.ai-name {
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}

.ai-text {
  line-height: 1.8;
  color: var(--text);
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Actions row */
.msg-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}
.msg-row.user .msg-actions { justify-content: flex-end; }

.act {
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--text3);
  font-size: 10px;
  padding: 4px 9px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.13s;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.act:hover { color: var(--text2); border-color: rgba(255,255,255,0.2); background: var(--bg3); }
.act.red:hover { color: #e07070; border-color: rgba(224,112,112,0.3); }
.act.green:hover { color: #7dba84; border-color: rgba(125,186,132,0.3); }

/* Edit inline */
.edit-wrap { width: 100%; max-width: 82%; margin-left: auto; }
.edit-ta {
  width: 100%;
  background: var(--bg3);
  border: 1px solid rgba(212,168,83,0.4);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 12px 16px;
  resize: none;
  outline: none;
  line-height: 1.75;
  min-height: 70px;
}
.edit-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
.edit-save {
  background: var(--accent);
  border: none;
  color: #1a1612;
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
}
.edit-cancel {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 12px;
}

/* Markdown */
.ai-text strong { color: var(--text); font-weight: 600; }
.ai-text em { color: var(--text2); font-style: italic; }
.ai-text code {
  background: var(--bg3);
  border: 1px solid var(--border2);
  padding: 1px 6px;
  border-radius: 5px;
  font-family: var(--font-body);
  font-size: 12.5px;
  color: #c9b87e;
}
.ai-text pre {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  overflow-x: auto;
  margin: 10px 0;
  position: relative;
}
.ai-text pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--text);
  font-size: 13px;
}
.ai-text h1,.ai-text h2,.ai-text h3 {
  font-family: var(--font-serif);
  color: var(--text);
  margin: 14px 0 6px;
  font-weight: normal;
  font-style: italic;
}
.ai-text h1 { font-size: 22px; }
.ai-text h2 { font-size: 18px; }
.ai-text h3 { font-size: 15px; }
.ai-text ul, .ai-text ol { padding-left: 22px; margin: 8px 0; }
.ai-text li { margin: 4px 0; line-height: 1.8; }
.ai-text blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 14px;
  color: var(--text2);
  margin: 8px 0;
  font-style: italic;
}
.ai-text hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.ai-text a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.ai-text p { margin: 6px 0; }
.ai-text table { border-collapse: collapse; width: 100%; margin: 10px 0; }
.ai-text th, .ai-text td { border: 1px solid var(--border2); padding: 8px 12px; text-align: left; }
.ai-text th { background: var(--bg3); color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Thinking */
.thinking-row {
  max-width: 780px;
  margin: 0 auto;
  padding: 4px 24px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.thinking-content { display: flex; align-items: center; gap: 10px; padding-top: 6px; }
.thinking-text { font-size: 12px; color: var(--text3); }
.dots { display: flex; gap: 4px; }
.dots span {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0.5;
  animation: bounce 1.4s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.18s; }
.dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.3} 40%{transform:translateY(-5px);opacity:1} }

/* Cursor */
.cursor {
  display: inline-block;
  width: 2px; height: 15px;
  background: var(--accent);
  border-radius: 1px;
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 1.1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── EMPTY STATE ── */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 40px 24px;
  text-align: center;
  pointer-events: none;
}
.empty-glyph {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 56px;
  color: var(--text3);
  line-height: 1;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-title {
  font-family: var(--font-serif);
  font-size: 26px;
  color: var(--text2);
  margin-bottom: 10px;
}
.empty-sub {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.8;
  max-width: 340px;
}

/* ── INPUT AREA ── */
#input-area {
  padding: 12px 20px 20px;
  flex-shrink: 0;
  background: var(--bg);
}

.input-shell {
  max-width: 780px;
  margin: 0 auto;
}

.input-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  transition: border-color 0.18s, box-shadow 0.18s;
  overflow: hidden;
}
.input-box:focus-within {
  border-color: rgba(212,168,83,0.35);
  box-shadow: 0 0 0 3px rgba(212,168,83,0.06);
}

.input-top {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 12px 14px 8px;
}

#input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  resize: none;
  max-height: 180px;
  line-height: 1.7;
  padding: 2px 0;
  overflow-y: auto;
}
#input::placeholder { color: var(--text3); }
#input::-webkit-scrollbar { width: 3px; }
#input::-webkit-scrollbar-thumb { background: var(--border); }

.send-btn {
  width: 36px; height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #1a1612;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  font-weight: bold;
}
.send-btn:hover { background: #e0b85e; transform: scale(1.04); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.send-btn.stop { background: #3a2020; border: 1px solid rgba(224,112,112,0.35); color: #e07070; }
.send-btn.stop:hover { background: rgba(224,112,112,0.2); transform: scale(1.04); }

.input-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px 10px;
}

.input-hint { font-size: 10px; color: var(--text3); }

.input-actions { display: flex; gap: 6px; }
.input-action-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 6px;
  transition: all 0.12s;
  font-family: var(--font-body);
}
.input-action-btn:hover { color: var(--text2); background: var(--bg3); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 12px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s;
  z-index: 999;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── OVERLAY (mobile sidebar) ── */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
  backdrop-filter: blur(2px);
}

/* ── MOBILE ── */
@media (max-width: 660px) {
  #sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #overlay.show { display: block; }
  #sidebar-toggle { display: flex; }
  .msg-outer { padding: 4px 14px; }
  .thinking-row { padding: 4px 14px; }
  #input-area { padding: 10px 12px 16px; }
  .user-bubble { max-width: 92%; }
  .edit-wrap { max-width: 92%; }
}

/* Divider between day groups */
.date-divider {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 16px 0 8px;
  display: flex; align-items: center; gap: 12px;
}
.date-divider::before, .date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Copy code btn inside pre */
.copy-code {
  position: absolute;
  top: 8px; right: 10px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--text3);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.12s;
}
.copy-code:hover { color: var(--text2); }
.ai-text pre { position: relative; }
</style>
</head>
<body>
<div id="shell">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="brand">Claude<span class="brand-dot">.</span></div>
      <button id="new-chat-btn">＋ &nbsp;New conversation</button>
    </div>
    <div id="conv-list"></div>
    <div id="sidebar-footer">
      <div class="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Connecting…</span>
      </div>
    </div>
  </div>

  <!-- OVERLAY -->
  <div id="overlay"></div>

  <!-- MAIN -->
  <div id="main">
    <!-- TOPBAR -->
    <div id="topbar">
      <button id="sidebar-toggle">☰</button>
      <div class="topbar-title" id="conv-title">New conversation</div>
      <div class="model-pill">
        <div class="model-pill-dot"></div>
        <select id="model-select">
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-opus-4-6">Opus 4.6</option>
          <option value="claude-haiku-4-5">Haiku 4.5</option>
          <option value="claude-sonnet-4-5">Sonnet 4.5</option>
        </select>
      </div>
      <button class="sys-btn" id="sys-toggle" title="System prompt">⚙</button>
    </div>

    <!-- SYSTEM PROMPT DRAWER -->
    <div id="sys-drawer">
      <div class="sys-inner">
        <label>System Prompt</label>
        <textarea id="sys-prompt" placeholder="Give Claude specific instructions for this conversation…" rows="2"></textarea>
      </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages">
      <div id="empty-state">
        <div class="empty-glyph">C</div>
        <div class="empty-title">How can I help you?</div>
        <div class="empty-sub">Your conversations sync across devices via your Puter account. Start typing to begin.</div>
      </div>
    </div>

    <!-- INPUT -->
    <div id="input-area">
      <div class="input-shell">
        <div class="input-box">
          <div class="input-top">
            <textarea id="input" placeholder="Message Claude…" rows="1"></textarea>
            <button class="send-btn" id="send-btn" title="Send">↑</button>
          </div>
          <div class="input-bottom">
            <span class="input-hint">Enter ↵ to send &nbsp;·&nbsp; Shift+Enter for new line</span>
            <div class="input-actions">
              <button class="input-action-btn" id="undo-btn" title="Undo last message" style="display:none">↩ Undo</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'claudechat_v2';

let conversations = {}; // id → {id, title, messages, createdAt, updatedAt, sysPrompt, model}
let currentConvId = null;
let undoStack = [];
let isStreaming = false;
let abortFlag = { v: false };

// DOM refs
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send-btn');
const convList   = document.getElementById('conv-list');
const convTitle  = document.getElementById('conv-title');
const modelSel   = document.getElementById('model-select');
const sysPromptEl= document.getElementById('sys-prompt');
const undoBtn    = document.getElementById('undo-btn');
const syncDot    = document.getElementById('sync-dot');
const syncLabel  = document.getElementById('sync-label');
const emptyState = document.getElementById('empty-state');
const sysDrawer  = document.getElementById('sys-drawer');

// ═══════════════════════════════════════════════════════
// SYNC via puter.kv  (cross-device)
// ═══════════════════════════════════════════════════════
function setSyncStatus(state, msg) {
  syncDot.className = 'sync-dot ' + (state === 'ok' ? 'ok' : state === 'syncing' ? 'syncing' : 'err');
  syncLabel.textContent = msg;
}

async function cloudSave() {
  setSyncStatus('syncing', 'Syncing…');
  try {
    await puter.kv.set(STORAGE_KEY, JSON.stringify(conversations));
    setSyncStatus('ok', 'Synced across devices');
  } catch(e) {
    // fallback to localStorage
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations)); } catch(_) {}
    setSyncStatus('err', 'Saved locally only');
  }
}

async function cloudLoad() {
  setSyncStatus('syncing', 'Loading…');
  try {
    const raw = await puter.kv.get(STORAGE_KEY);
    if (raw) {
      conversations = JSON.parse(raw);
      setSyncStatus('ok', 'Synced across devices');
    } else {
      // try localStorage migration
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) conversations = JSON.parse(local);
      setSyncStatus('ok', 'Synced across devices');
    }
  } catch(e) {
    try {
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) conversations = JSON.parse(local);
    } catch(_) {}
    setSyncStatus('err', 'Offline — saved locally');
  }
}

// ═══════════════════════════════════════════════════════
// CONVERSATION MANAGEMENT
// ═══════════════════════════════════════════════════════
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function createConv() {
  const id = genId();
  conversations[id] = {
    id,
    title: 'New conversation',
    messages: [],
    createdAt: Date.now(),
    updatedAt: Date.now(),
    sysPrompt: '',
    model: 'claude-sonnet-4-6'
  };
  return id;
}

function currentConv() { return conversations[currentConvId]; }

function autoTitle(text) {
  const t = text.trim().replace(/\s+/g, ' ');
  return t.length > 42 ? t.slice(0, 42) + '…' : t;
}

function switchConv(id) {
  currentConvId = id;
  undoStack = [];
  const conv = currentConv();
  modelSel.value = conv.model || 'claude-sonnet-4-6';
  sysPromptEl.value = conv.sysPrompt || '';
  convTitle.textContent = conv.title;
  updateUndoBtn();
  renderAll();
  renderSidebar();
  closeSidebar();
}

function deleteConv(id) {
  delete conversations[id];
  if (currentConvId === id) {
    const ids = Object.keys(conversations);
    if (ids.length) switchConv(ids[ids.length - 1]);
    else { currentConvId = null; renderAll(); }
  }
  renderSidebar();
  cloudSave();
}

// ═══════════════════════════════════════════════════════
// SIDEBAR RENDER
// ═══════════════════════════════════════════════════════
function renderSidebar() {
  convList.innerHTML = '';
  const sorted = Object.values(conversations).sort((a,b) => b.updatedAt - a.updatedAt);
  if (!sorted.length) {
    convList.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:14px 12px;">No conversations yet</div>';
    return;
  }

  // Group by date
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const week = new Date(today); week.setDate(week.getDate() - 7);

  const groups = { Today: [], Yesterday: [], 'This week': [], Older: [] };
  sorted.forEach(c => {
    const d = new Date(c.updatedAt); d.setHours(0,0,0,0);
    if (+d === +today) groups.Today.push(c);
    else if (+d === +yesterday) groups.Yesterday.push(c);
    else if (d >= week) groups['This week'].push(c);
    else groups.Older.push(c);
  });

  Object.entries(groups).forEach(([label, items]) => {
    if (!items.length) return;
    const sec = document.createElement('div');
    sec.className = 'conv-section-label';
    sec.textContent = label;
    convList.appendChild(sec);
    items.forEach(c => {
      const item = document.createElement('div');
      item.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
      item.innerHTML = `<span class="conv-item-icon">💬</span><span class="conv-item-title">${esc(c.title)}</span><button class="conv-delete" title="Delete">✕</button>`;
      item.querySelector('.conv-item-title').onclick = () => switchConv(c.id);
      item.querySelector('.conv-item-icon').onclick = () => switchConv(c.id);
      item.querySelector('.conv-delete').onclick = (e) => { e.stopPropagation(); deleteConv(c.id); };
      convList.appendChild(item);
    });
  });
}

// ═══════════════════════════════════════════════════════
// MESSAGE RENDER
// ═══════════════════════════════════════════════════════
function renderAll() {
  messagesEl.innerHTML = '';
  const conv = currentConv();
  if (!conv || !conv.messages.length) {
    messagesEl.appendChild(emptyState);
    return;
  }
  conv.messages.forEach((m, i) => appendMessage(m, i));
  scrollBottom();
}

function appendMessage(msg, idx) {
  const outer = document.createElement('div');
  outer.className = 'msg-outer';
  outer.dataset.idx = idx;

  const row = document.createElement('div');
  row.className = 'msg-row ' + msg.role;

  if (msg.role === 'user') {
    const bubble = document.createElement('div');
    bubble.className = 'user-bubble';
    bubble.textContent = msg.content;

    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.appendChild(mkAct('✎ Edit', '', () => startEdit(idx, outer, bubble, actions)));
    actions.appendChild(mkAct('⎘ Copy', '', () => { navigator.clipboard.writeText(msg.content); toast('Copied'); }));
    actions.appendChild(mkAct('✕', 'red', () => delMsg(idx)));

    row.appendChild(bubble);
    row.appendChild(actions);
  } else {
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.textContent = '◈';

    const content = document.createElement('div');
    content.className = 'ai-content';

    const name = document.createElement('div');
    name.className = 'ai-name';
    name.textContent = 'Claude';

    const text = document.createElement('div');
    text.className = 'ai-text';
    text.innerHTML = mdToHtml(msg.content);
    addCopyCodeBtns(text);

    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.appendChild(mkAct('↺ Retry', 'green', () => regenerate(idx)));
    actions.appendChild(mkAct('⎘ Copy', '', () => { navigator.clipboard.writeText(msg.content); toast('Copied'); }));
    actions.appendChild(mkAct('✕', 'red', () => delMsg(idx)));

    content.appendChild(name);
    content.appendChild(text);
    content.appendChild(actions);
    row.appendChild(avatar);
    row.appendChild(content);
  }

  outer.appendChild(row);
  messagesEl.appendChild(outer);
}

function mkAct(label, cls, fn) {
  const b = document.createElement('button');
  b.className = 'act ' + cls;
  b.textContent = label;
  b.onclick = fn;
  return b;
}

function addCopyCodeBtns(el) {
  el.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-code';
    btn.textContent = 'copy';
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.querySelector('code')?.innerText || pre.innerText);
      btn.textContent = 'copied!';
      setTimeout(() => btn.textContent = 'copy', 1500);
    };
    pre.appendChild(btn);
  });
}

function scrollBottom() {
  setTimeout(() => messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' }), 40);
}

// ═══════════════════════════════════════════════════════
// MARKDOWN → HTML
// ═══════════════════════════════════════════════════════
function mdToHtml(text) {
  let t = esc(text);
  // code blocks
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  // inline code
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // headers
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // bold/italic
  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // blockquote
  t = t.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // hr
  t = t.replace(/^---+$/gm, '<hr>');
  // unordered list
  t = t.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // ordered list
  t = t.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // links
  t = t.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
  // paragraphs (double newline)
  t = t.replace(/\n\n/g, '</p><p>');
  // single newline
  t = t.replace(/\n/g, '<br>');
  // wrap
  if (!t.startsWith('<')) t = '<p>' + t + '</p>';
  return t;
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════
// SEND
// ═══════════════════════════════════════════════════════
async function send(userText, replaceFromIdx = null) {
  if (!userText.trim() || isStreaming) return;
  const conv = currentConv();

  // Undo snapshot
  undoStack.push(JSON.parse(JSON.stringify(conv.messages)));
  if (undoStack.length > 30) undoStack.shift();
  updateUndoBtn();

  // Truncate if editing
  if (replaceFromIdx !== null) {
    conv.messages = conv.messages.slice(0, replaceFromIdx);
  }
  conv.messages.push({ role: 'user', content: userText });

  // Auto-title on first message
  if (conv.messages.length === 1) {
    conv.title = autoTitle(userText);
    convTitle.textContent = conv.title;
  }

  conv.updatedAt = Date.now();
  renderAll();

  // Thinking indicator
  const thinkOuter = document.createElement('div');
  thinkOuter.className = 'thinking-row';
  thinkOuter.innerHTML = `<div class="ai-avatar" style="opacity:.5">◈</div><div class="thinking-content"><div class="dots"><span></span><span></span><span></span></div><span class="thinking-text">Thinking…</span></div>`;
  messagesEl.appendChild(thinkOuter);
  scrollBottom();

  // Stream setup
  isStreaming = true;
  abortFlag = { v: false };
  const thisFlag = abortFlag;
  sendBtn.className = 'send-btn stop';
  sendBtn.textContent = '■';
  sendBtn.title = 'Stop';

  let fullText = '';

  try {
    const sys = sysPromptEl.value.trim();
    const apiMsgs = conv.messages.map(m => ({ role: m.role, content: m.content }));
    const puterMsgs = sys ? [{ role: 'system', content: sys }, ...apiMsgs] : apiMsgs;
    const opts = { model: modelSel.value, stream: true };

    thinkOuter.remove();

    // Streaming bubble
    const outer = document.createElement('div');
    outer.className = 'msg-outer';
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.textContent = '◈';
    const content = document.createElement('div');
    content.className = 'ai-content';
    const name = document.createElement('div');
    name.className = 'ai-name';
    name.textContent = 'Claude';
    const textEl = document.createElement('div');
    textEl.className = 'ai-text';
    textEl.innerHTML = '<span class="cursor"></span>';
    content.appendChild(name);
    content.appendChild(textEl);
    row.appendChild(avatar);
    row.appendChild(content);
    outer.appendChild(row);
    messagesEl.appendChild(outer);
    scrollBottom();

    const stream = await puter.ai.chat(puterMsgs, opts);
    for await (const chunk of stream) {
      if (thisFlag.v) break;
      fullText += chunk?.text || '';
      textEl.innerHTML = mdToHtml(fullText) + '<span class="cursor"></span>';
      scrollBottom();
    }
    textEl.innerHTML = mdToHtml(fullText);
    addCopyCodeBtns(textEl);

    // Add action buttons
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const msgIdx = conv.messages.length;
    conv.messages.push({ role: 'assistant', content: fullText });
    conv.updatedAt = Date.now();
    actions.appendChild(mkAct('↺ Retry', 'green', () => regenerate(conv.messages.length - 1)));
    actions.appendChild(mkAct('⎘ Copy', '', () => { navigator.clipboard.writeText(fullText); toast('Copied'); }));
    actions.appendChild(mkAct('✕', 'red', () => delMsg(conv.messages.length - 1)));
    content.appendChild(actions);

    cloudSave();
    renderSidebar();

  } catch(e) {
    thinkOuter.remove();
    if (!thisFlag.v) {
      toast('Error: ' + (e.message || 'Something went wrong'));
    }
    if (fullText) {
      conv.messages.push({ role: 'assistant', content: fullText });
      conv.updatedAt = Date.now();
      cloudSave();
    }
  }

  isStreaming = false;
  sendBtn.className = 'send-btn';
  sendBtn.textContent = '↑';
  sendBtn.title = 'Send';
  updateUndoBtn();
}

function stopStream() {
  abortFlag.v = true;
  isStreaming = false;
  sendBtn.className = 'send-btn';
  sendBtn.textContent = '↑';
  sendBtn.title = 'Send';
  toast('Stopped');
}

// ═══════════════════════════════════════════════════════
// EDIT / DELETE / REGENERATE
// ═══════════════════════════════════════════════════════
function startEdit(idx, outer, bubble, actions) {
  bubble.style.display = 'none';
  actions.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.className = 'edit-wrap';
  const ta = document.createElement('textarea');
  ta.className = 'edit-ta';
  ta.value = currentConv().messages[idx].content;
  ta.rows = 3;

  const btns = document.createElement('div');
  btns.className = 'edit-actions';

  const cancel = document.createElement('button');
  cancel.className = 'edit-cancel';
  cancel.textContent = 'Cancel';
  cancel.onclick = () => {
    wrap.remove();
    bubble.style.display = '';
    actions.style.display = '';
  };

  const save = document.createElement('button');
  save.className = 'edit-save';
  save.textContent = 'Save & Resend';
  save.onclick = () => {
    const t = ta.value.trim();
    if (!t) return;
    outer.remove();
    send(t, idx);
  };

  btns.appendChild(cancel);
  btns.appendChild(save);
  wrap.appendChild(ta);
  wrap.appendChild(btns);
  outer.querySelector('.msg-row').appendChild(wrap);

  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function delMsg(idx) {
  const conv = currentConv();
  undoStack.push(JSON.parse(JSON.stringify(conv.messages)));
  updateUndoBtn();
  conv.messages.splice(idx, 1);
  conv.updatedAt = Date.now();
  renderAll();
  cloudSave();
}

function regenerate(idx) {
  const conv = currentConv();
  let userIdx = idx - 1;
  while (userIdx >= 0 && conv.messages[userIdx].role !== 'user') userIdx--;
  if (userIdx < 0) return;
  const userMsg = conv.messages[userIdx].content;
  undoStack.push(JSON.parse(JSON.stringify(conv.messages)));
  updateUndoBtn();
  conv.messages = conv.messages.slice(0, userIdx);
  renderAll();
  send(userMsg, null);
}

// ═══════════════════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════════════════
function updateUndoBtn() {
  undoBtn.style.display = undoStack.length ? 'inline-block' : 'none';
}

undoBtn.onclick = () => {
  if (!undoStack.length) return;
  const conv = currentConv();
  conv.messages = undoStack.pop();
  conv.updatedAt = Date.now();
  renderAll();
  updateUndoBtn();
  cloudSave();
  toast('Undone');
};

// ═══════════════════════════════════════════════════════
// MOBILE SIDEBAR
// ═══════════════════════════════════════════════════════
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('sidebar-toggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
};
document.getElementById('overlay').onclick = closeSidebar;

// ═══════════════════════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════════════════════
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

sendBtn.addEventListener('click', () => {
  if (isStreaming) { stopStream(); return; }
  doSend();
});

function doSend() {
  if (isStreaming) return;
  const t = inputEl.value.trim();
  if (!t) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // Ensure we have a conversation
  if (!currentConvId || !conversations[currentConvId]) {
    currentConvId = createConv();
    renderSidebar();
  }
  send(t);
}

// ═══════════════════════════════════════════════════════
// OTHER CONTROLS
// ═══════════════════════════════════════════════════════
document.getElementById('new-chat-btn').onclick = () => {
  const id = createConv();
  conversations[id].model = modelSel.value;
  conversations[id].sysPrompt = '';
  switchConv(id);
  cloudSave();
};

document.getElementById('sys-toggle').onclick = () => {
  sysDrawer.classList.toggle('open');
};

sysPromptEl.addEventListener('input', () => {
  if (currentConv()) {
    currentConv().sysPrompt = sysPromptEl.value;
    cloudSave();
  }
});

modelSel.addEventListener('change', () => {
  if (currentConv()) {
    currentConv().model = modelSel.value;
    cloudSave();
  }
});

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  await cloudLoad();
  const ids = Object.keys(conversations);
  if (ids.length) {
    // Switch to most recent
    const latest = Object.values(conversations).sort((a,b) => b.updatedAt - a.updatedAt)[0];
    currentConvId = latest.id;
    modelSel.value = latest.model || 'claude-sonnet-4-6';
    sysPromptEl.value = latest.sysPrompt || '';
    convTitle.textContent = latest.title;
  }
  renderSidebar();
  renderAll();
}

init();
</script>
</body>
</html>
